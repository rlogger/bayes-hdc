name: Bug report
description: Report a reproducible bug in bayes-hdc
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest Python snippet that reproduces the issue.
      render: python
      placeholder: |
        import jax, bayes_hdc as hd
        model = hd.MAP.create(dimensions=10000)
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (including full traceback)
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: bayes-hdc version
      placeholder: e.g. 0.1.0a0 or commit SHA
    validations:
      required: true

  - type: input
    id: jax-version
    attributes:
      label: JAX / jaxlib version
      placeholder: e.g. jax 0.4.28, jaxlib 0.4.28
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: e.g. Ubuntu 24.04, macOS 15.1 arm64, Windows 11
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.3
    validations:
      required: true

  - type: dropdown
    id: accelerator
    attributes:
      label: Accelerator
      options:
        - CPU only
        - CUDA GPU
        - TPU
        - Apple Metal
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else we should know (e.g. workarounds you tried).
