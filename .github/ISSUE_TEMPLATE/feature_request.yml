name: Feature request
description: Suggest a new capability, primitive, or VSA model
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today that you want to do?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch or algorithm you have in mind.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why you rejected them.

  - type: input
    id: reference
    attributes:
      label: Reference (paper, repo, or prior implementation)
      placeholder: e.g. Frady et al. (2020), "Resonator networks"

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New VSA model
        - New encoder
        - New classifier / learning model
        - New memory module
        - Functional primitive
        - Analysis / metric
        - Dataset
        - Performance / JIT / distribution
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a pull request implementing this.
        - label: I can help review a pull request from someone else.
