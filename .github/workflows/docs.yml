name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'bayes_hdc/**'
      - 'docs/**'
      - 'pyproject.toml'
      - '.readthedocs.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'bayes_hdc/**'
      - 'docs/**'
      - 'pyproject.toml'
      - '.readthedocs.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install bayes-hdc with examples extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[examples]"

      - name: Install docs requirements
        run: python -m pip install -r docs/requirements.txt

      - name: Build HTML docs
        run: python -m sphinx -b html -W --keep-going docs docs/_build/html

      - name: Check internal links
        run: python -m sphinx -b linkcheck docs docs/_build/linkcheck || true

      - name: Upload built docs artefact
        uses: actions/upload-artifact@v4
        with:
          name: bayes-hdc-html-docs
          path: docs/_build/html
          retention-days: 14
