# SPDX-License-Identifier: MIT
#
# Pre-commit hooks for bayes-hdc. Run on every commit locally to mirror CI.
# Install with: `pip install pre-commit && pre-commit install`
# Update hooks with: `pre-commit autoupdate`

repos:
  # Hygiene: trailing whitespace, end-of-file, large files, merge conflicts.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(pdf|png)$'
      - id: end-of-file-fixer
        exclude: '\.(pdf|png)$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: check-yaml
      - id: check-toml
      - id: check-json

  # ruff = lint + format, matching CI exactly.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # mypy strict on bayes_hdc/.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: '^bayes_hdc/'
        additional_dependencies:
          - 'jax>=0.4.20'
          - 'numpy'
